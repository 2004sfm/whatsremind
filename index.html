<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsRemind</title>
    <!-- Script mínimo para evitar flash blanco y aplicar tema al instante -->
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #f8fafc; /* slate-50 */
        color: #0f172a; /* slate-900 */
        font-family: system-ui, -apple-system, sans-serif;
      }
      html.dark body, html.dark {
        background-color: #020617; /* slate-950 */
        color: #f8fafc;
      }
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background-color: #f8fafc;
      }
      html.dark .initial-loader {
        background-color: #020617;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(16, 185, 129, 0.2); /* emerald-500/20 */
        border-top-color: #10b981; /* emerald-500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loader-text {
        font-weight: 600;
        font-size: 1.125rem;
        letter-spacing: 0.05em;
        opacity: 0.8;
      }
      .logo-pulse {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        color: #10b981;
        font-weight: 800;
        font-size: 1.75rem;
        margin-bottom: 1rem;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .logo-img {
        width: 80px;
        height: 80px;
        object-fit: contain;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
    </style>
  </head>
